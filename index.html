<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE95 — World Map Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8A6E2F;
    --bg: #0A0A08;
    --bg2: #111109;
    --bg3: #1A1A14;
    --surface: #16160F;
    --surface2: #1E1E16;
    --text: #E8E4D8;
    --text-muted: #7A7668;
    --correct: #4CAF7A;
    --wrong: #C9504C;
    --highlight: rgba(201,168,76,0.25);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    background: linear-gradient(180deg, rgba(10,10,8,0.98) 0%, rgba(10,10,8,0.85) 100%);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .header-center {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    line-height: 1;
  }
  .score-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
  .score-correct .score-num { color: var(--correct); }
  .score-wrong .score-num { color: var(--wrong); }
  .score-total .score-num { color: var(--gold); }
  .sep { width: 1px; height: 28px; background: rgba(201,168,76,0.2); }

  /* ── MAP ── */
  #map-container {
    position: fixed;
    top: 56px; left: 0; right: 0; bottom: 80px;
    overflow: hidden;
    background: var(--bg);
  }

  svg#world-map {
    width: 100%; height: 100%;
    cursor: crosshair;
    touch-action: none;
  }

  .country {
    fill: var(--bg3);
    stroke: rgba(201,168,76,0.55);
    stroke-width: 0.6px;
    transition: fill 0.15s ease, stroke 0.15s ease;
    cursor: pointer;
  }
  .country:hover { fill: var(--surface2); stroke: rgba(201,168,76,0.9); stroke-width: 0.9px; }
  .country.target  { fill: rgba(201,168,76,0.12); stroke: var(--gold); stroke-width: 1.6px; animation: pulse-border 1.5s ease-in-out infinite; }
  .country.correct { fill: rgba(76,175,122,0.28); stroke: var(--correct); stroke-width: 1.4px; }
  .country.wrong   { fill: rgba(201,80,76,0.28); stroke: var(--wrong); stroke-width: 1.4px; }
  .country.revealed { fill: rgba(201,168,76,0.15); stroke: var(--gold-dim); stroke-width: 1px; }

  @keyframes pulse-border {
    0%, 100% { stroke-opacity: 0.5; }
    50% { stroke-opacity: 1; }
  }

  /* graticule */
  .graticule {
    fill: none;
    stroke: rgba(201,168,76,0.07);
    stroke-width: 0.3px;
  }
  .sphere { fill: #0C0C0A; }

  /* ── QUIZ PANEL ── */
  #quiz-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(0deg, rgba(10,10,8,0.98) 0%, rgba(10,10,8,0.9) 100%);
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 24px;
    backdrop-filter: blur(12px);
  }

  .question-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 260px;
  }
  .question-type {
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .question-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--gold-light);
    text-align: center;
    line-height: 1.1;
  }
  .question-hint { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

  /* region filter */
  .action-btns { display: flex; flex-direction: column; gap: 6px; }
  .btn {
    padding: 8px 20px;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-reveal {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-dim);
  }
  .btn-reveal:hover { background: rgba(201,168,76,0.18); color: var(--gold); }
  .btn-new {
    background: var(--gold);
    color: var(--bg);
    font-weight: 500;
  }
  .btn-new:hover { background: var(--gold-light); }

  /* ── FEEDBACK TOAST ── */
  #feedback {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    padding: 10px 28px;
    border-radius: 2px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 200;
    white-space: nowrap;
  }
  #feedback.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #feedback.correct { background: rgba(76,175,122,0.15); border: 1px solid var(--correct); color: var(--correct); }
  #feedback.wrong   { background: rgba(201,80,76,0.12); border: 1px solid var(--wrong); color: var(--wrong); }
  #feedback.info    { background: rgba(201,168,76,0.1); border: 1px solid var(--gold-dim); color: var(--gold-light); }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 6px 14px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 2px;
    white-space: nowrap;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .splash-logo {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .splash-tagline {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .splash-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .splash-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-muted);
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }
  .splash-modes {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-start {
    margin-top: 8px;
    padding: 16px 56px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn-start:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* ── PROGRESS BAR ── */
  #progress-bar {
    position: fixed;
    top: 56px;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 0.4s ease;
    z-index: 90;
  }

  /* region filter */
  .region-btns { display: flex; gap: 4px; }
  .region-btn {
    padding: 4px 10px;
    border: 1px solid rgba(201,168,76,0.2);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Jost', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .region-btn:hover, .region-btn.active {
    border-color: var(--gold-dim);
    color: var(--gold-dim);
  }

  /* end screen */
  #end-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 400;
    background: rgba(10,10,8,0.95);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #end-screen.show { display: flex; }
  .end-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .end-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: var(--gold-light);
    line-height: 1;
  }
  .end-sub { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); }
  .end-stats { display: flex; gap: 48px; }
  .end-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .end-stat-num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; }
  .end-stat-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); }
  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 600px) {

    /* Header — logo + score only, hide center label */
    header {
      padding: 0 14px;
      height: 50px;
    }
    .header-center { display: none; }
    .score-bar { gap: 12px; }
    .score-num { font-size: 18px; }
    .score-label { font-size: 8px; }
    .sep { height: 22px; }

    /* Progress bar matches new header height */
    #progress-bar { top: 50px; }

    /* Map fills between header and taller panel */
    #map-container { top: 50px; bottom: 96px; }

    /* Quiz panel — stack vertically, taller */
    #quiz-panel {
      height: 96px;
      flex-direction: row;
      gap: 12px;
      padding: 0 14px;
      align-items: center;
    }
    .question-block {
      min-width: 0;
      flex: 1;
      gap: 2px;
    }
    .question-type { font-size: 8px; letter-spacing: 0.18em; }
    .question-main { font-size: 20px; }
    .question-hint { font-size: 10px; }

    .action-btns { flex-direction: column; gap: 5px; flex-shrink: 0; }
    .btn { padding: 7px 14px; font-size: 9px; letter-spacing: 0.12em; }

    /* Splash — tighter layout */
    #splash { gap: 18px; padding: 24px 20px; }
    .splash-logo img { height: 80px !important; }
    .splash-tagline { font-size: 9px; }
    .splash-desc { font-size: 15px; max-width: 100%; text-align: center; }
    .splash-divider { width: 50px; }

    .region-btns { flex-wrap: wrap; justify-content: center; gap: 5px; }
    .region-btn { padding: 5px 10px; font-size: 8px; }

    .btn-start { padding: 13px 36px; font-size: 10px; }

    /* End screen */
    .end-title { font-size: 36px; }
    .end-score { font-size: 56px; }
    .end-stats { gap: 24px; }
    .end-stat-num { font-size: 28px; }

    /* Feedback toast */
    #feedback { font-size: 14px; padding: 8px 18px; max-width: 90vw; text-align: center; white-space: normal; }

    /* Tooltip — disable on touch */
    #tooltip { display: none; }
  }

  @media (max-width: 380px) {
    .question-main { font-size: 17px; }
    .score-num { font-size: 15px; }
    #quiz-panel { height: 88px; }
    #map-container { bottom: 88px; }
  }
</style>
</head>

// ISO2 → flag emoji
function isoToFlag(iso) {
  if (!iso || iso.length !== 2) return '🏳️';
  const offset = 127397;
  try {
    return String.fromCodePoint(iso.toUpperCase().charCodeAt(0) + offset) +
           String.fromCodePoint(iso.toUpperCase().charCodeAt(1) + offset);
  } catch(e) { return '🏳️'; }
}

const nameLookup = buildNameLookup();

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let gameState = {
  mode: 'name',
  region: 'ALL',
  queue: [],
  current: null,
  answered: new Set(),
  correct: 0,
  totalAttempts: 0,
  revealed: 0,
  currentAttempts: 0,
  active: false,
  locked: false
};

let svgReady = false;
let geoReady = false;
let isoToPath = {}; // iso → SVG path element

// ═══════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════
const svg = d3.select('#world-map');
const container = document.getElementById('map-container');

function getSize() {
  return [container.clientWidth, container.clientHeight];
}

let [W, H] = getSize();
function getMapScale() { return Math.min(W, H * 1.6) / 6.0; }
const projection = d3.geoNaturalEarth1()
  .scale(getMapScale())
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);

const g = svg.append('g');

// SVG defs — subtle drop shadow on land
const defs = svg.append('defs');
defs.append('filter')
  .attr('id', 'land-shadow')
  .html(`<feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="rgba(0,0,0,0.7)" flood-opacity="0.6"/>`);

// sphere
g.append('path')
  .datum({type: 'Sphere'})
  .attr('class', 'sphere')
  .attr('d', path);

// graticule
const graticule = d3.geoGraticule()();
g.append('path')
  .datum(graticule)
  .attr('class', 'graticule')
  .attr('d', path);

// zoom
const zoom = d3.zoom()
  .scaleExtent([0.8, 12])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// load world topojson
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    return countries;
  })
  .then(countries => {
    // world-atlas uses numeric ISO codes, need to map to alpha-2
    // We'll use a pre-built numeric → alpha2 table
    const num2iso = buildNumericToISO();

    g.selectAll('.country')
      .data(countries.features)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .style('filter', 'url(#land-shadow)')
      .attr('data-num', d => d.id)
      .attr('data-iso', d => num2iso[String(d.id)] || '')
      .on('click', function(event, d) {
        if (!gameState.active || gameState.locked) return;
        const iso = num2iso[String(d.id)] || '';
        handleClick(iso, this);
      })
      .on('mousemove', function(event, d) {
        const iso = num2iso[String(d.id)] || '';
        const info = countryMap[iso];
        const tooltip = document.getElementById('tooltip');
        if (info && gameState.answered.has(iso)) {
          tooltip.textContent = info.name;
          tooltip.style.opacity = '1';
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 28) + 'px';
        } else {
          tooltip.style.opacity = '0';
        }
      })
      .on('mouseleave', () => {
        document.getElementById('tooltip').style.opacity = '0';
      });

    // build iso→path lookup
    g.selectAll('.country').each(function(d) {
      const iso = num2iso[String(d.id)] || '';
      if (iso) isoToPath[iso] = this;
    });

    geoReady = true;
    checkReady();
  })
  .catch(err => {
    console.error('Map load error:', err);
    document.getElementById('q-main').textContent = 'Map load failed — check console';
  });

// resize
window.addEventListener('resize', () => {
  [W, H] = getSize();
  projection.scale(getMapScale()).translate([W / 2, H / 2]);
  svg.selectAll('.sphere').attr('d', path);
  svg.selectAll('.graticule').attr('d', d3.geoPath().projection(projection)(graticule));
  svg.selectAll('.country').attr('d', path);
});

// ═══════════════════════════════════════════════════════
//  SPLASH LOGIC
// ═══════════════════════════════════════════════════════
let splashRegion = 'ALL';

document.querySelectorAll('#splash-regions .region-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#splash-regions .region-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    splashRegion = btn.dataset.region;
  });
});

document.getElementById('btn-start').addEventListener('click', () => {
  gameState.mode = 'name';
  gameState.region = splashRegion;
  document.getElementById('splash').style.display = 'none';
  startGame();
});

// ═══════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════
function checkReady() {
  svgReady = true;
}

function getFilteredCountries() {
  let list = COUNTRIES_DATA;
  if (gameState.region !== 'ALL') {
    list = list.filter(([iso, name, capital, region]) => region === gameState.region);
  }
  // only include countries we have on the map
  return list.filter(([iso]) => isoToPath[iso]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  gameState.correct = 0;
  gameState.totalAttempts = 0;
  gameState.revealed = 0;
  gameState.currentAttempts = 0;
  gameState.answered = new Set();
  gameState.locked = false;
  gameState.active = true;

  // reset map
  d3.selectAll('.country').classed('correct wrong revealed target', false);

  // build queue
  const pool = getFilteredCountries();
  gameState.queue = shuffle([...pool]);
  gameState.total = gameState.queue.length;

  updateScoreUI();
  nextQuestion();
}

function nextQuestion() {
  if (gameState.queue.length === 0) {
    endGame(); return;
  }
  gameState.locked = false;
  gameState.currentAttempts = 0;

  // clear any lingering highlights
  d3.selectAll('.country.target').classed('target', false);
  d3.selectAll('.country.wrong').classed('wrong', false);

  const entry = gameState.queue.pop();
  const [iso] = entry;
  gameState.current = iso;

  const info = countryMap[iso];
  const regionLabel = { AF:'Africa', EU:'Europe', AS:'Asia', NA:'Americas', SA:'South America', OC:'Oceania' }[info.region] || '';

  document.getElementById('q-type').textContent = 'Click the country on the map';
  document.getElementById('q-main').innerHTML = info.name;
  document.getElementById('q-hint').textContent = regionLabel;

  updateProgress();
}

function handleClick(iso, el) {
  if (!iso || gameState.locked) return;

  const target = gameState.current;
  if (!target) return;

  gameState.totalAttempts++;
  gameState.currentAttempts++;

  if (iso === target) {
    // ✓ Correct — advance
    gameState.correct++;
    gameState.answered.add(iso);
    el.classList.remove('wrong');
    el.classList.add('correct');
    const attemptsMsg = gameState.currentAttempts === 1
      ? '✓ First try!' 
      : `✓ Got it in ${gameState.currentAttempts} attempt${gameState.currentAttempts > 1 ? 's' : ''}`;
    showFeedback('correct', attemptsMsg);
    updateScoreUI();
    gameState.locked = true;
    setTimeout(nextQuestion, 900);
  } else {
    // ✗ Wrong — flash red, stay on same question
    el.classList.add('wrong');
    showFeedback('wrong', `✗ That's ${countryMap[iso]?.name || '?'} — keep trying`);
    updateScoreUI();
    // Remove wrong highlight after a moment, let them keep clicking
    setTimeout(() => el.classList.remove('wrong'), 700);
  }
}

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.className = 'show ' + type;
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2200);
}

function updateScoreUI() {
  document.getElementById('sc-correct').textContent = gameState.correct;
  document.getElementById('sc-wrong').textContent = gameState.totalAttempts;
  document.getElementById('sc-total').textContent = gameState.queue.length;
}

function updateProgress() {
  const done = gameState.total - gameState.queue.length;
  const pct = gameState.total > 0 ? (done / gameState.total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function endGame() {
  gameState.active = false;
  document.getElementById('end-pct').textContent = `${gameState.correct} / ${gameState.total}`;
  document.getElementById('end-correct').textContent = gameState.correct;
  document.getElementById('end-wrong').textContent = gameState.totalAttempts;
  document.getElementById('end-skipped').textContent = gameState.revealed;
  document.getElementById('end-screen').classList.add('show');
}

document.getElementById('btn-reveal').addEventListener('click', () => {
  if (!gameState.active || gameState.locked) return;
  const target = gameState.current;
  if (!target) return;
  gameState.locked = true;
  gameState.revealed++;
  d3.selectAll('.country.wrong').classed('wrong', false);
  if (isoToPath[target]) {
    isoToPath[target].classList.add('target');
    showFeedback('info', `📍 ${countryMap[target].name}`);
    setTimeout(() => {
      isoToPath[target].classList.remove('target');
      isoToPath[target].classList.add('revealed');
      gameState.answered.add(target);
      nextQuestion();
    }, 2200);
  } else {
    nextQuestion();
  }
  updateScoreUI();
});

document.getElementById('btn-play-again').addEventListener('click', () => {
  document.getElementById('end-screen').classList.remove('show');
  d3.selectAll('.country').classed('correct wrong revealed target', false);
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('splash').style.display = 'flex';
});
</script>
